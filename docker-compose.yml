version: '3.8'

services:
  jobogram:
    build: .
    container_name: jobogram
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - APP_URL=${APP_URL:-https://jobogram.ru}
      - DEBUG=${DEBUG:-False}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - web-network

networks:
  web-network:
    driver: bridge